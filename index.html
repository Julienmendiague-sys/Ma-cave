<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ma Cave · Haier HWS84GA</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: radial-gradient(ellipse at 50% 40%, #3A0E1E 0%, #220A12 40%, #120508 100%);
  font-family:'Georgia',serif; color:#E8D5A0; overflow:hidden;
}
canvas { display:block; }

#ui {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:20px 24px; pointer-events:none;
  background:linear-gradient(180deg,#0A080990 0%,transparent 100%);
  transition: filter 0.4s;
}
#brand { font-size:10px; letter-spacing:3px; color:#5A4A52; text-transform:uppercase; margin-bottom:3px; }
#title { font-size:24px; font-weight:700; color:#E8D5A0; letter-spacing:2px; text-shadow:0 2px 12px #00000090; }
#subtitle { font-size:11px; color:#5A4A52; letter-spacing:2px; margin-top:2px; }

#stats { display:flex; gap:10px; }
.stat-box {
  background:#1C1018CC; border:1px solid #B8952A28;
  border-radius:10px; padding:9px 14px; text-align:center;
  backdrop-filter:blur(12px);
  box-shadow:0 4px 16px #00000060, inset 0 1px 0 #B8952A18;
}
.stat-num { font-size:20px; font-weight:700; color:#B8952A; line-height:1; }
.stat-lbl { font-size:9px; color:#5A4A52; letter-spacing:1.5px; margin-top:3px; text-transform:uppercase; }

#controls {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  display:flex; gap:8px; transition: filter 0.4s;
}

/* Floating camera button — Vivino-style, above the view controls */
#btn-camera-wrap {
  position: fixed;
  bottom: 88px;
  right: 24px;
  z-index: 25;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
#btn-camera {
  width: 62px; height: 62px;
  border-radius: 31px;
  border: none; cursor: pointer;
  background: linear-gradient(160deg, #7A1A3A 0%, #4A0E22 100%);
  box-shadow: 0 6px 0 #00000080, 0 12px 32px #7A1A3A60, 0 0 0 4px #080608, 0 0 0 5px #B8952A40, inset 0 1px 0 #E8D5A040;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
#btn-camera:active { transform: scale(0.94); }
#btn-camera-label {
  font-size: 9px; letter-spacing: 1.5px; color: #7A6570;
  text-transform: uppercase;
}

/* Scan result overlay */
#scan-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s;
}
#scan-overlay.visible { opacity: 1; pointer-events: all; }
#scan-backdrop {
  position: absolute; inset: 0;
  background: #08060890; backdrop-filter: blur(10px);
}
#scan-panel {
  position: relative; z-index: 2;
  width: min(100%, 480px);
  max-height: 82vh; overflow-y: auto;
  background: linear-gradient(160deg, #2E1A24 0%, #1C1018 100%);
  border-radius: 22px 22px 0 0;
  border-top: 1px solid #B8952A30;
  box-shadow: 0 -8px 40px #00000090;
  padding: 24px 22px 32px;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(.2,.8,.3,1);
}
#scan-overlay.visible #scan-panel { transform: translateY(0); }
#scan-close {
  position: absolute; top: 16px; right: 16px;
  width: 32px; height: 32px; border-radius: 16px; border: none; cursor: pointer;
  background: #3A2030; color: #A08090; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btn {
  padding:9px 18px; border-radius:9px; border:none; cursor:pointer;
  font-family:'Georgia',serif; font-size:12px; letter-spacing:0.8px;
  background:#221520; color:#A08090;
  box-shadow:0 3px 0 #00000070, inset 0 1px 0 #FFFFFF0C;
  transition:all .18s;
}
.ctrl-btn:hover { background:#2E1A28; color:#E8D5A0; transform:translateY(-1px); }
.ctrl-btn.active { background:#6A1430; color:#E8C870; box-shadow:0 2px 0 #00000070, 0 0 12px #7A1A3A40, inset 0 1px 0 #FFFFFF18; }

#hint {
  position:fixed; bottom:72px; left:50%; transform:translateX(-50%);
  font-size:10px; color:#3A2A32; letter-spacing:1px; pointer-events:none; white-space:nowrap;
  transition: filter 0.4s;
}

#light-wrap {
  position: fixed; bottom: 88px; left: 24px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  z-index: 20; transition: filter 0.4s;
}
#btn-light {
  width: 54px; height: 54px; border-radius: 50%;
  border: none; cursor: pointer; background: #1A0E16;
  box-shadow: 0 4px 0 #00000080, 0 8px 24px #00000060, inset 0 1px 0 #FFFFFF10;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.35s, box-shadow 0.35s;
}
#btn-light.lit {
  background: radial-gradient(circle at 40% 35%, #FFF8D0, #E8C040 55%, #A07808);
  box-shadow: 0 4px 0 #00000060, 0 0 28px #FFCC4470, 0 0 56px #FFB02030, inset 0 1px 0 #FFFFFF60;
}
#btn-light svg { transition: all 0.35s; }
#btn-light.lit svg { filter: drop-shadow(0 0 5px #FFD040); }
#light-label { font-size: 9px; letter-spacing: 1.5px; color: #3A2A32; text-transform: uppercase; pointer-events: none; transition: color 0.4s; }
#light-label.lit { color: #C0A040; }

/* ── SHELF 3D OVERLAY ────────────────────────────────────────────────────── */
#shelf-overlay {
  position: fixed; inset: 0; z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s;
}
#shelf-overlay.visible { opacity: 1; pointer-events: all; }

#shelf-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}

/* Top bar */
#shelf-topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 20px 24px;
  background: linear-gradient(180deg, #0A060890 0%, transparent 100%);
}
#shelf-title { font-size: 20px; font-weight: 700; color: #E8D5A0; letter-spacing: 1px; }
#shelf-subtitle { font-size: 11px; color: #7A6570; letter-spacing: 1px; margin-top: 3px; }
#btn-close-shelf {
  width: 38px; height: 38px; border-radius: 19px; border: none; cursor: pointer;
  background: #2A1520CC; color: #A08090; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
  box-shadow: 0 2px 0 #00000060, inset 0 1px 0 #FFFFFF10;
  transition: all .2s;
}
#btn-close-shelf:hover { background:#3A2030CC; color:#E8D5A0; }

/* Bottom info bar */
#shelf-bottombar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
  padding: 16px 24px 32px;
  background: linear-gradient(0deg, #0A060890 0%, transparent 100%);
  display: flex; justify-content: space-between; align-items: flex-end;
}
#shelf-count { font-size: 12px; color: #7A6570; letter-spacing: 0.5px; }
#shelf-count span { color: #B8952A; font-weight: 700; }
#shelf-hint { font-size: 10px; color: #3A2A32; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="ui">
  <div>
    <div id="brand">Haier HWS84GA · Wine Bank 50 SE</div>
    <div id="title">MA CAVE</div>
    <div id="subtitle">Collection privée · 3D</div>
  </div>
  <div id="stats">
    <div class="stat-box"><div class="stat-num" id="stat-total">0</div><div class="stat-lbl">Bouteilles</div></div>
    <div class="stat-box"><div class="stat-num">84</div><div class="stat-lbl">Capacité</div></div>
  </div>
</div>

<div id="hint">☞ Ouvrir la porte pour déplacer les clayettes</div>

<div id="light-wrap">
  <button id="btn-light" onclick="toggleLight()" title="Lumière intérieure">
    <svg id="bulb-svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#5A3A60" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="9" r="4"/>
      <path d="M10 13.5v1.5a2 2 0 0 0 4 0v-1.5"/>
      <line x1="12" y1="2" x2="12" y2="1"/>
      <line x1="4.22" y1="4.22" x2="3.51" y2="3.51"/>
      <line x1="19.78" y1="4.22" x2="20.49" y2="3.51"/>
      <line x1="2" y1="9" x2="1" y2="9"/>
      <line x1="22" y1="9" x2="23" y2="9"/>
    </svg>
  </button>
  <div id="light-label">Lumière</div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-front" onclick="setView('front')">Face</button>
  <button class="ctrl-btn" id="btn-open" onclick="toggleDoor()">Ouvrir</button>
</div>

<!-- ── FLOATING CAMERA BUTTON ── -->
<input id="camera-input" type="file" accept="image/*" capture="environment" style="display:none">
<div id="btn-camera-wrap">
  <button id="btn-camera" onclick="document.getElementById('camera-input').click()" title="Scanner une étiquette">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#E8D5A0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  </button>
  <div id="btn-camera-label">Scanner</div>
</div>

<!-- ── SCAN RESULT OVERLAY ── -->
<div id="scan-overlay">
  <div id="scan-backdrop" onclick="closeScanOverlay()"></div>
  <div id="scan-panel">
    <button id="scan-close" onclick="closeScanOverlay()">✕</button>
    <div id="scan-body"></div>
  </div>
</div>

<!-- ── SHELF 3D OVERLAY ──────────────────────────────────────────────────── -->
<div id="shelf-overlay">
  <canvas id="shelf-canvas"></canvas>
  <div id="shelf-topbar">
    <div>
      <div id="shelf-title">Clayette nº<span id="shelf-num">1</span></div>
      <div id="shelf-subtitle">12 emplacements</div>
    </div>
    <button id="btn-close-shelf" onclick="closeShelfView()">✕</button>
  </div>
  <div id="shelf-bottombar">
    <div id="shelf-count"><span id="fill-count">0</span> / 12 emplacements occupés</div>
    <div id="shelf-hint">☞ Glisser pour pivoter</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Scene ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1A0810, 0.032);

const camera = new THREE.PerspectiveCamera(36, innerWidth/innerHeight, 0.01, 80);
camera.position.set(0, 0, 9.1);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setClearColor(0x000000, 0);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// ─── Lights ───────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x180810, 1.2));
const sun = new THREE.DirectionalLight(0xFFF0E0, 2.2);
sun.position.set(4, 6, 5); sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.1; sun.shadow.camera.far=30;
sun.shadow.camera.left=-4; sun.shadow.camera.right=4;
sun.shadow.camera.top=4;   sun.shadow.camera.bottom=-4;
sun.shadow.bias=-0.0005;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x301820, 0.8);
fill.position.set(-3,1,-2); scene.add(fill);
const rim = new THREE.DirectionalLight(0xC0A060, 0.85);
rim.position.set(0,-4,3); scene.add(rim);

const ledA = new THREE.PointLight(0xFFCC88, 0.0, 3.0);
ledA.position.set(0, 0.6, 0.5); scene.add(ledA);
const ledB = new THREE.PointLight(0xFFBB66, 0.0, 2.0);
ledB.position.set(0, -0.8, 0.5); scene.add(ledB);

// ─── Dimensions ───────────────────────────────────────────────────────────────
const CW=1.0, CD=1.178, CH=2.556, WT=0.055;
const iW=CW-2*WT, iD=CD-2*WT, iH=CH-2*WT;

const ledTop = new THREE.PointLight(0xFFDDA0, 0.0, 4.0);
ledTop.position.set(0, CH/2-WT-0.12, 0.2); scene.add(ledTop);

// ─── Materials ────────────────────────────────────────────────────────────────
const matFrame    = new THREE.MeshStandardMaterial({ color:0x080608, roughness:0.08, metalness:0.75 });
const matInner    = new THREE.MeshStandardMaterial({ color:0x14101A, roughness:0.7, metalness:0.05 });
const matWood     = new THREE.MeshStandardMaterial({ color:0xC8906A, roughness:0.75, metalness:0.0 });
const matWoodEdge = new THREE.MeshStandardMaterial({ color:0xE0AA80, roughness:0.6,  metalness:0.05 });
// Glass — layered for a richer, more premium look
const matGlass = new THREE.MeshPhysicalMaterial({
  color: 0x0E1822,
  roughness: 0.12,
  metalness: 0.0,
  transparent: true,
  opacity: 0.22,
  side: THREE.DoubleSide,
  clearcoat: 0.5,
  clearcoatRoughness: 0.2,
  reflectivity: 0.25,
});
// Soft vertical sheen — brighter near top, fading down (simulates ambient ceiling light raking across glass)
const matGlassSheen = new THREE.MeshStandardMaterial({
  color: 0xEAF2FF, roughness: 0.05, metalness: 0.1,
  transparent: true, opacity: 0.05, side: THREE.FrontSide,
});
// Thin bright edge-highlight strip near the top (catch-light)
const matGlassCatchlight = new THREE.MeshStandardMaterial({
  color: 0xFFFFFF, roughness: 0.02, metalness: 0.3,
  transparent: true, opacity: 0.14, side: THREE.FrontSide,
});
const matPanel    = new THREE.MeshStandardMaterial({ color:0x0A0710, roughness:0.45, metalness:0.3 });
const matScreen   = new THREE.MeshStandardMaterial({ color:0x001830, roughness:0.3,  metalness:0.5,  emissive:0x004488, emissiveIntensity:0.9 });
const matGold     = new THREE.MeshStandardMaterial({ color:0xB8952A, roughness:0.2,  metalness:0.9 });
const matLabel    = new THREE.MeshStandardMaterial({ color:0xF5EEDD, roughness:0.9,  metalness:0.0 });
const matWoodSel  = new THREE.MeshStandardMaterial({ color:0xFFD070, roughness:0.5,  metalness:0.1 });
const matWoodEdgeSel = new THREE.MeshStandardMaterial({ color:0xFFE090, roughness:0.4, metalness:0.15 });

// ─── Cave group ───────────────────────────────────────────────────────────────
const caveGroup = new THREE.Group();
caveGroup.scale.set(1.26, 1.26, 1.26);  // slightly reduced for stability
scene.add(caveGroup);

function box(w,h,d,mat,x=0,y=0,z=0,rx=0,ry=0,rz=0,sh=true){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); m.rotation.set(rx,ry,rz);
  if(sh){m.castShadow=true;m.receiveShadow=true;}
  caveGroup.add(m); return m;
}

// Outer shell
box(CW,CH,WT,   matFrame, 0,0,-(CD/2-WT/2));
box(WT,CH,CD,   matFrame, -(CW/2-WT/2),0,0);
box(WT,CH,CD,   matFrame,  (CW/2-WT/2),0,0);
box(CW,WT,CD,   matFrame, 0, CH/2-WT/2,0);
box(CW,WT,CD,   matFrame, 0,-CH/2+WT/2,0);
const FRTW=0.028;
box(CW,FRTW,FRTW,matFrame,0, CH/2-FRTW/2,CD/2-FRTW/2);
box(CW,FRTW,FRTW,matFrame,0,-CH/2+FRTW/2,CD/2-FRTW/2);
box(FRTW,CH,FRTW,matFrame,-(CW/2-FRTW/2),0,CD/2-FRTW/2);
box(FRTW,CH,FRTW,matFrame, (CW/2-FRTW/2),0,CD/2-FRTW/2);
// Inner cavity — slightly thicker and pulled inward to avoid z-fighting with outer frame
const innerGap = 0.008;
box(iW-2*innerGap, iH-innerGap, 0.015, matInner, 0, -innerGap/2, -(CD/2-WT-innerGap));
box(0.015, iH-innerGap, iD-2*innerGap, matInner, -(CW/2-WT-innerGap), -innerGap/2, 0);
box(0.015, iH-innerGap, iD-2*innerGap, matInner,  (CW/2-WT-innerGap), -innerGap/2, 0);
box(iW-2*innerGap, 0.015, iD-2*innerGap, matInner, 0, CH/2-WT-innerGap, 0);
box(iW-2*innerGap, 0.02, iD-2*innerGap, matInner, 0, -CH/2+WT+0.025, 0);
// Control panel
const PNLH=0.095, pnlY=CH/2-PNLH/2, pnlZ=CD/2-0.005;
box(CW-2*FRTW,PNLH,0.008,matPanel,0,pnlY,pnlZ);
box(0.30,0.042,0.003,matScreen,-0.08,pnlY,pnlZ+0.005);
const iconMat=new THREE.MeshStandardMaterial({color:0x334466,roughness:0.4,metalness:0.5,emissive:0x112244,emissiveIntensity:0.5});
[-0.38,-0.30,0.18,0.26,0.34].forEach(ix=>box(0.025,0.018,0.003,iconMat,ix,pnlY,pnlZ+0.004));

// ─── Shelves ──────────────────────────────────────────────────────────────────
const usableTop = CH/2-WT-PNLH;
const usableBot = -CH/2+WT;
const usableH   = usableTop-usableBot;
const SHELF_COUNT=7;
const shelfSpacing = usableH/SHELF_COUNT;
const shelfW=iW-0.06, shelfD3=iD-0.14;
const slatH=0.016, slatSec=0.015;
const SLAT_COUNT=10, slatSpacing=shelfW/SLAT_COUNT;
const backZ=-(CD/2-WT)+0.05, frontZ2=backZ+shelfD3, midZ=backZ+shelfD3/2;

const shelfGroups=[];
// Shelf data: bottles per shelf (max 12)
const shelfData = Array.from({length:SHELF_COUNT}, (_,i)=>({
  index: i,
  label: `Clayette nº${i+1}`,
  bottles: Array(12).fill(null)
}));

// Wine stock — synced with the management app
const WINES_STOCK = [
  { name:'Château Margaux', vintage:'2018', type:'rouge', parker:98, suckling:97, robinson:95, quantity:3 }
];
// Pre-fill shelves from stock
let _slot=0;
WINES_STOCK.forEach(w=>{
  for(let q=0;q<w.quantity;q++){
    const si=Math.floor(_slot/12), bi=_slot%12;
    if(si<shelfData.length) shelfData[si].bottles[bi]={name:w.name,vintage:w.vintage,type:w.type,parker:w.parker,suckling:w.suckling,robinson:w.robinson};
    _slot++;
  }
});

function buildShelf(sy, idx){
  const g=new THREE.Group();
  g.position.set(0,sy,0);
  caveGroup.add(g);
  const meshes=[];
  function lbox(w,h,d,mat,x=0,y=0,z=0){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true;
    g.add(m); meshes.push(m); return m;
  }
  lbox(shelfW,slatSec,slatSec,matWoodEdge,0,0,frontZ2-slatSec/2);
  lbox(shelfW,slatSec,slatSec,matWoodEdge,0,0,backZ+slatSec/2);
  for(let s=0;s<SLAT_COUNT;s++){
    const sx=-shelfW/2+slatSpacing/2+s*slatSpacing;
    lbox(slatSec,slatH,shelfD3,matWood,sx,0,midZ);
  }
  const railH=0.036;
  lbox(shelfW,railH,0.013,matWoodEdge,0,slatH/2+railH/2,frontZ2+0.009);
  lbox(shelfW*0.5,railH*0.48,0.001,matLabel,0,slatH/2+railH/2,frontZ2+0.016);
  return {group:g, targetY:sy, currentY:sy, meshes, selected:false, index:idx};
}

function highlightShelf(sh,on){
  sh.selected=on;
  sh.meshes.forEach(m=>{
    if(on){ m.userData.origMat=m.material; m.material=m.material===matWood?matWoodSel:m.material===matWoodEdge?matWoodEdgeSel:m.material; }
    else  { if(m.userData.origMat) m.material=m.userData.origMat; }
  });
}

for(let i=0;i<SHELF_COUNT;i++){
  const sy=usableBot+shelfSpacing*(i+0.5);
  shelfGroups.push(buildShelf(sy,i));
}

// ─── Persistence: restore + save shelf positions (localStorage works everywhere) ──
function loadShelfPositions(){
  try{
    const raw = localStorage.getItem('ma-cave-shelf-positions');
    if(raw){
      const saved = JSON.parse(raw);
      saved.forEach((y, i) => {
        if(shelfGroups[i] && typeof y === 'number'){
          shelfGroups[i].targetY = y;
          shelfGroups[i].currentY = y;
          shelfGroups[i].group.position.y = y;
        }
      });
    }
  }catch(e){ /* no saved data yet, or storage unavailable */ }
}

function saveShelfPositions(){
  try{
    const positions = shelfGroups.map(s => s.targetY);
    localStorage.setItem('ma-cave-shelf-positions', JSON.stringify(positions));
  }catch(e){ /* storage unavailable, fail silently */ }
}

loadShelfPositions();

// ─── Door ─────────────────────────────────────────────────────────────────────
const doorGroup=new THREE.Group();
doorGroup.position.set(-CW/2,0,CD/2);
caveGroup.add(doorGroup);
const doorH=CH-PNLH, doorY=-PNLH/2, DB=0.04;

function dbox(w,h,d,mat,x,y,z){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); m.castShadow=true; doorGroup.add(m);
}
dbox(CW,DB,0.028,matFrame, CW/2, doorY+doorH/2-DB/2, 0);
dbox(CW,DB,0.028,matFrame, CW/2, doorY-doorH/2+DB/2, 0);
dbox(DB,doorH,0.028,matFrame, DB/2, doorY, 0);
dbox(DB,doorH,0.028,matFrame, CW-DB/2, doorY, 0);
const glassW=CW-2*DB, glassH=doorH-2*DB;
// Base glass pane
const glass1=new THREE.Mesh(new THREE.PlaneGeometry(glassW,glassH),matGlass);

// ─── Raycaster ────────────────────────────────────────────────────────────────
const raycaster=new THREE.Raycaster();
const mouse2d=new THREE.Vector2();

function pickShelf(clientX,clientY){
  mouse2d.x=(clientX/innerWidth)*2-1;
  mouse2d.y=-(clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse2d,camera);
  const allMeshes=shelfGroups.flatMap(s=>s.meshes);
  const hits=raycaster.intersectObjects(allMeshes,false);
  if(!hits.length) return null;
  const hitMesh=hits[0].object;
  return shelfGroups.find(s=>s.meshes.includes(hitMesh))||null;
}

// ── Mini Three.js scene for shelf 3D view ─────────────────────────────────────
let sRenderer=null, sScene=null, sCamera=null, sAnimId=null;
let sDrag=false, sPx=0, sPy=0;
let sRotX=-0.3, sRotY=0.5, sTRotX=-0.3, sTRotY=0.5;
let sGroup=null;

const BCOLS3={rouge:0x1A0608, blanc:0x182A18, rosé:0x1E0C14, pétillant:0x0A1020};
const CCOLS3={rouge:0x7A1020, blanc:0xB09018, rosé:0xB06070, pétillant:0x203080};

    sPx=e.touches[0].clientX; sPy=e.touches[0].clientY;

function buildShelf3D(data){
  if(sGroup){ sScene.remove(sGroup); }
  sGroup=new THREE.Group();
  sScene.add(sGroup);

  // Real Haier shelf: 460mm wide × 530mm deep → scale 1u=497mm
  // SW=0.926, SD=1.066 → upscale ×2.4 for display
  const SCALE3=2.4;
  const SW=0.926*SCALE3, SD=1.066*SCALE3, slatSec2=0.05*SCALE3, slatH2=0.04*SCALE3;
  const SLATS=10, gap=SW/SLATS;
  const bkZ=-SD/2, frZ=SD/2;

  const mWood=new THREE.MeshStandardMaterial({color:0xC8906A,roughness:0.7,metalness:0.0});
  const mEdge=new THREE.MeshStandardMaterial({color:0xE0AA80,roughness:0.55,metalness:0.05});
  const mLbl =new THREE.MeshStandardMaterial({color:0xF5EEDD,roughness:0.9});

  function sb(w,h,d,mat,x=0,y=0,z=0){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true;
    sGroup.add(m);
  }

  // Front + back rails
  sb(SW,slatSec2,slatSec2,mEdge, 0,0,frZ-slatSec2/2);
  sb(SW,slatSec2,slatSec2,mEdge, 0,0,bkZ+slatSec2/2);
  // Left + right side rails
  sb(slatSec2,slatH2,SD,mEdge, -SW/2+slatSec2/2,0,0);
  sb(slatSec2,slatH2,SD,mEdge,  SW/2-slatSec2/2,0,0);
  // Slats
  for(let s=0;s<SLATS;s++){
    const sx=-SW/2+gap/2+s*gap;
    sb(slatSec2,slatH2,SD,mWood,sx,0,0);
  }
  // Front label rail
  sb(SW,0.12,0.05,mEdge, 0,slatH2/2+0.06,frZ+0.03);
  sb(SW*0.4,0.06,0.004,mLbl, 0,slatH2/2+0.06,frZ+0.056);

  // Bottles — laid horizontally on the shelf
  const COLS=6, ROWS=2;
  const bSpX=SW/COLS;
  let filled=0;
  const BSCALE=SCALE3*0.9; // bottle scale relative to shelf

  for(let row=0;row<ROWS;row++){
    for(let col=0;col<COLS;col++){
      const idx=row*COLS+col;
      const b=data.bottles[idx]||null;
      const bx=-SW/2+bSpX/2+col*bSpX;
      const bz=row===0 ? -SD*0.20 : SD*0.20;
      const by=slatH2/2+0.13*BSCALE;

      if(b){
        filled++;
        const bMat=new THREE.MeshStandardMaterial({color:BCOLS3[b.type]||0x1A0608,roughness:0.12,metalness:0.25,transparent:true,opacity:0.9});
        const cMat=new THREE.MeshStandardMaterial({color:CCOLS3[b.type]||0x7A1020,roughness:0.3,metalness:0.6});
        const lMat=new THREE.MeshStandardMaterial({color:0xF0E8D0,roughness:0.85});
        const g=new THREE.Group();
        const bs=BSCALE*0.9;
        g.rotation.z=Math.PI/2;
        g.position.set(bx,by,bz);
        const body=new THREE.Mesh(new THREE.CylinderGeometry(0.06*bs,0.06*bs,0.34*bs,14),bMat); body.castShadow=true; g.add(body);
        const sho=new THREE.Mesh(new THREE.CylinderGeometry(0.036*bs,0.06*bs,0.08*bs,14),bMat); sho.position.y=0.21*bs; sho.castShadow=true; g.add(sho);
        const nk=new THREE.Mesh(new THREE.CylinderGeometry(0.026*bs,0.036*bs,0.1*bs,12),bMat); nk.position.y=0.30*bs; nk.castShadow=true; g.add(nk);
        const cap=new THREE.Mesh(new THREE.CylinderGeometry(0.030*bs,0.030*bs,0.055*bs,12),cMat); cap.position.y=0.385*bs; cap.castShadow=true; g.add(cap);
        const lblGeo=new THREE.CylinderGeometry(0.062*bs,0.062*bs,0.12*bs,14,1,true,-1.3,2.6);
        const lbl=new THREE.Mesh(lblGeo,lMat); lbl.position.y=-0.02*bs; g.add(lbl);
        sGroup.add(g);
      } else {
        // Empty slot — subtle flat oval outline resting on the shelf, not a 3D bottle
        const bs2=BSCALE*0.9;
        const ringMat=new THREE.MeshStandardMaterial({
          color:0x4A3540, roughness:1.0, metalness:0.0,
          transparent:true, opacity:0.22, side:THREE.DoubleSide
        });
        const ringGeo=new THREE.RingGeometry(0.05*bs2, 0.062*bs2, 24);
        const ring=new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x=-Math.PI/2;
        ring.position.set(bx, slatH2/2+0.002, bz);
        ring.castShadow=false; ring.receiveShadow=false;
        sGroup.add(ring);
      }
    }
  }
  document.getElementById('fill-count').textContent=filled;
}

function animateShelf(){

// ─── Orbit + Shelf drag + double-tap ─────────────────────────────────────────
let drag=false, px=0, py=0;
let rotX=0.10, rotY=0.275, tRotX=0.10, tRotY=0.275;
let zoom=9.1, tZoom=9.1;
let activeShelf=null, dragStartY=0, shelfStartY=0, dragZoomLock=8.8;
let lastTapTime=0, lastTapShelf=null;

function screenToWorld(screenDY, zoomVal){
  const vFovRad=camera.fov*Math.PI/180;
  const worldH=2*Math.tan(vFovRad/2)*zoomVal;
  return -(screenDY/innerHeight)*worldH;
}

function onPointerDown(clientX,clientY){
  if(shelfViewOpen) return;
  px=clientX; py=clientY; drag=false;
  const hit=doorOpen?pickShelf(clientX,clientY):null;
  if(hit){
    // Double-tap detection
    const now=Date.now();
    if(lastTapShelf===hit && now-lastTapTime<350){
      // Double tap → open shelf view
      openShelfView(hit);
      lastTapTime=0; lastTapShelf=null;
      return;
    }
    lastTapTime=now; lastTapShelf=hit;
    if(activeShelf && activeShelf!==hit) highlightShelf(activeShelf,false);
    activeShelf=hit; dragStartY=clientY; shelfStartY=hit.targetY; dragZoomLock=zoom;
    highlightShelf(hit,true);
  } else {
    if(activeShelf){highlightShelf(activeShelf,false);activeShelf=null;}
    lastTapShelf=null;
    drag=true;
  }
}

function onPointerMove(clientX,clientY){
  if(shelfViewOpen) return;
  const dx=clientX-px, dy=clientY-py;
  if(activeShelf){
    const totalDY = clientY - dragStartY;
    if(Math.abs(totalDY) >= 3){
      const worldDY=screenToWorld(totalDY, dragZoomLock);
      let newY=shelfStartY+worldDY;
      newY=Math.max(usableBot+0.05,Math.min(usableTop-0.05,newY));
      activeShelf.targetY=newY;
    }
    px=clientX; py=clientY;
    return;
  }
  if(drag){
    tRotY+=dx*0.007; tRotX+=dy*0.007;
    tRotX=Math.max(-0.9,Math.min(0.9,tRotX));
  }
  px=clientX; py=clientY;
}

function onPointerUp(){
  if(activeShelf){
    saveShelfPositions();
    highlightShelf(activeShelf,false);
    activeShelf=null;
  }
  drag=false;
}

renderer.domElement.addEventListener('mousedown',e=>onPointerDown(e.clientX,e.clientY));
renderer.domElement.addEventListener('touchstart',e=>onPointerDown(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
window.addEventListener('mousemove',e=>{if(drag||activeShelf)onPointerMove(e.clientX,e.clientY);});
window.addEventListener('touchmove',e=>{onPointerMove(e.touches[0].clientX,e.touches[0].clientY);if(activeShelf)e.preventDefault();},{passive:false});

// ─── Render loop ──────────────────────────────────────────────────────────────
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  rotX+=(tRotX-rotX)*0.07; rotY+=(tRotY-rotY)*0.07; zoom+=(tZoom-zoom)*0.07;
  caveGroup.rotation.x=rotX; caveGroup.rotation.y=rotY;
  camera.position.z=zoom;
  doorAngle+=(tDoor-doorAngle)*0.055;
  doorGroup.rotation.y=doorAngle;
  shelfGroups.forEach(s=>{s.currentY+=(s.targetY-s.currentY)*0.12;s.group.position.y=s.currentY;});
  ledT+=dt;
  ledCurrent+=(ledTarget-ledCurrent)*(dt*1.8);
  const flicker=lightOn?ledCurrent*(1.4+Math.sin(ledT*4.1)*0.04+Math.sin(ledT*13.7)*0.018):ledCurrent*1.4;
  ledA.intensity=flicker; ledB.intensity=flicker*0.55; ledTop.intensity=flicker*0.7;
  renderer.render(scene,camera);
}
animate();

const BCOLS_SCAN={rouge:0x1A0608,blanc:0x182A18,rosé:0x1E0C14,'pétillant':0x0A1020};

function typeGlyphJS(t){ return t==='rouge'?'🍷':t==='blanc'?'🥂':t==='rosé'?'🌸':'✨'; }
function typeLabelJS(t){ return t==='rouge'?'Rouge':t==='blanc'?'Blanc':t==='rosé'?'Rosé':'Pétillant'; }

async function analyzeWineLabel(b64){
  // Proxy securise Vercel — cle API cote serveur uniquement
  const res = await fetch("/api/analyze", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ imageBase64: b64 })
  });
  if(!res.ok){
    const t = await res.text().catch(()=>"");
    throw new Error("Erreur serveur (" + res.status + "): " + t.slice(0,200));
  }
  const wine = await res.json();
  if(wine.error) throw new Error(wine.error);
  return wine;
}

function findFirstEmptySlot(){
  for(let si=0; si<shelfData.length; si++){
    const bi = shelfData[si].bottles.findIndex(b=>!b);
    if(bi !== -1) return {si, bi};
  }
  return null;
}

function addScannedBottle(wine){
  const slot = findFirstEmptySlot();
  if(!slot) return false;
  shelfData[slot.si].bottles[slot.bi] = {
    name: wine.name, vintage: wine.vintage, type: wine.type,
    parker: wine.parker?.score || null, suckling: wine.suckling?.score || null, robinson: wine.robinson?.score || null
  };
  updateBottleCount();
  return true;
}

// Compress/resize image before sending — iPhone camera photos can be 5-10MB,
// which likely causes the API request to be rejected or malformed.
function compressImage(file, maxDim=1200, quality=0.82){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if(width > height && width > maxDim){
        height = Math.round(height * (maxDim/width));
        width = maxDim;
      } else if(height > maxDim){
        width = Math.round(width * (maxDim/height));
        height = maxDim;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      resolve(dataUrl.split(',')[1]); // return base64 only
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Impossible de charger l'image")); };
    img.src = url;
  });
}

document.getElementById('camera-input').addEventListener('change', async (e)=>{
  const file = e.target.files[0];

    </div>
  `);

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const b64 = ev.target.result.split(',')[1];
    try{
      const wine = await analyzeWineLabel(b64);
      const col = '#'+(BCOLS_SCAN[wine.type]||0x1A0608).toString(16).padStart(6,'0');

      function scoreBlock(label, critic){
        if(!critic || !critic.score) return '';
        return '<div style="margin-bottom:10px;">'
          + '<div style="font-size:10px;color:#7A6570;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;">'+label+'</div>'

          + (critic.note ? '<div style="font-size:11px;color:#7A6570;font-style:italic;margin-top:3px;">'+critic.note+'</div>' : '')
          + '</div>';
      }

      const scoresHtml = scoreBlock('Robert Parker', wine.parker)
        + scoreBlock('James Suckling', wine.suckling)
        + scoreBlock('Jancis Robinson', wine.robinson)
        || '<div style="color:#7A6570;font-size:13px;font-style:italic;text-align:center;">Notes non disponibles</div>';

      const desc = wine.description
        ? '<div style="font-size:13px;color:#F0E6D3CC;font-style:italic;border-left:2px solid #B8952A50;padding-left:14px;margin-bottom:18px;line-height:1.6;">'+wine.description+'</div>'
        : '';

      showScanPanel(
        '<div style="display:inline-flex;align-items:center;gap:5px;padding:3px 12px;border-radius:20px;margin-bottom:12px;background:'+col+'30;border:1px solid '+col+'60;">'
        + '<span style="font-size:12px;">'+typeGlyphJS(wine.type)+'</span>'
        + '<span style="font-size:11px;color:#E8D5A0;letter-spacing:1px;font-weight:600;">'+typeLabelJS(wine.type).toUpperCase()+'</span>'
        + '</div>'
        + '<div style="font-size:20px;font-weight:700;color:#E8D5A0;line-height:1.2;margin-bottom:4px;">'+(wine.name||'Vin non identifie')+'</div>'
        + '<div style="font-size:12px;color:#7A6570;margin-bottom:16px;">'+(wine.appellation||'')+' &middot; '+(wine.vintage||'')+' &middot; '+(wine.region||'')+(wine.country?', '+wine.country:'')+'</div>'
        + desc
        + '<div style="background:#221320;border-radius:12px;padding:14px 16px;margin-bottom:18px;">'+scoresHtml+'</div>'
        + '<div style="display:flex;gap:10px;">'
        + '<button id="confirm-add-bottle" style="flex:1;padding:15px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#7A1A3A,#4A0E22);color:#E8D5A0;font-family:inherit;font-size:14px;font-weight:700;">Ajouter a ma cave</button>'
        + '<button onclick="closeScanOverlay()" style="padding:15px 18px;border:none;border-radius:12px;cursor:pointer;background:#221320;color:#7A6570;">&#x2715;</button>'
        + '</div>'
      );

      document.getElementById('confirm-add-bottle').onclick = function(){
        const added = addScannedBottle(wine);
        closeScanOverlay();
        if(!added) alert('Toutes les clayettes sont pleines !');
      };

    }catch(err){
      console.error('Scan error:', err);
      showScanPanel(
        '<div style="background:#1A0808;border-radius:14px;padding:20px;border:1px solid #5A2020;color:#FF9090;font-size:14px;">'
        + '<div style="font-weight:600;margin-bottom:8px;">&#9888; Erreur</div>'
        + '<div style="font-size:12px;word-break:break-word;">'+(err.message||'Erreur inconnue')+'</div>'
        + '<button onclick="closeScanOverlay()" style="display:block;margin-top:14px;padding:8px 18px;background:#221320;border:none;border-radius:8px;color:#7A6570;cursor:pointer;">Fermer</button>'
        + '</div>'
      );
    }
  };
  reader.readAsDataURL(file);
});</script>
</body>
</html>
